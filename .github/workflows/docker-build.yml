name: Build and Push Multiple Docker Images to GHCR

on:
  push:
    tags:
      - 'v*'

# Permet au workflow de publier des packages sur GitHub
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image-config:
          - { name: "backend", context: "./dev/server/backend", file: "./dev/server/backend/Dockerfile.prod" }
          - { name: "access_point", context: "./dev/server/access_point", file: "./dev/server/access_point/Dockerfile.prod" }

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Connexion à GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        # github.actor est la personne (ou le bot) qui lance le workflow
        username: ${{ github.actor }}
        # GITHUB_TOKEN est fourni automatiquement par GitHub pour ce workflow
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extraire les métadonnées pour Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        # Format pour GHCR : ghcr.io/nom-proprietaire/nom-image
        # github.repository_owner passe automatiquement en minuscule pour Docker
        images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image-config.name }}
        tags: |
          type=ref,event=tag
          type=raw,value=latest

    - name: Build et Push de l'image Docker
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.image-config.context }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}